<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>オハナ | 訪問看護ステーション</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>

  <body>
    <!-- ===== ヘッダー ===== -->
    <header>
      <div class="header-inner">
        <h1 class="logo">オハナ</h1>
        <nav class="nav">
          <ul>
            <li>特徴</li>
            <li>サービス</li>
            <li>スタッフ</li>
            <li>お問い合わせ</li>
          </ul>
        </nav>
      </div>
    </header>

    <!-- ===== メイン ===== -->
    <main>
      
      <!-- ファーストビュー -->
      <section class="hero">
        <div class="hero-inner">
          <h2>ご自宅で安心できる看護を</h2>
          <p>オハナ訪問看護ステーション</p>
        </div>
      </section>

      <!-- 特徴 -->
      <section class="features">
        <h2>オハナの特徴</h2>

        <div class="features-list">
          <div class="feature-card">
            <h3>特徴01</h3>
            <p>説明テキスト</p>
          </div>

          <div class="feature-card">
            <h3>特徴02</h3>
            <p>説明テキスト</p>
          </div>

          <div class="feature-card">
            <h3>特徴03</h3>
            <p>説明テキスト</p>
          </div>
        </div>
      </section>

      <!-- ご利用の流れ -->
      <section class="flow">
        <h2>ご利用の流れ</h2>

        <div class="flow-list">
          <div class="flow-item">お問い合わせ</div>
          <div class="flow-item">ご説明</div>
          <div class="flow-item">ご契約</div>
          <div class="flow-item">ご利用開始</div>
        </div>
      </section>

      <!-- スタッフ紹介 -->
      <section class="staff">
        <h2>スタッフ紹介</h2>

        <div class="staff-list">
          <div class="staff-card">
            <p>スタッフ名</p>
            <p>説明</p>
          </div>

          <div class="staff-card">
            <p>スタッフ名</p>
            <p>説明</p>
          </div>
        </div>
      </section>

      <!-- お問い合わせ -->
      <section class="contact">
        <h2>お問い合わせ</h2>
        <p>お気軽にご相談ください</p>
        <p class="tel">000-0000-0000</p>
      </section>

      <!-- FAQ -->
      <section class="faq">
        <h2>よくある質問</h2>

        <div class="faq-item">
          <p class="question">Q. 質問内容</p>
          <p class="answer">A. 回答内容</p>
        </div>

        <div class="faq-item">
          <p class="question">Q. 質問内容</p>
          <p class="answer">A. 回答内容</p>
        </div>
      </section>

    </main>

    <!-- ===== フッター ===== -->
    <footer>
      <p>© Ohana</p>
    </footer>

    <script src="./js/main.js"></script>
  </body>
</html>
